query GetPageByContentfulId($contentfulId: String!) {
  pageCollection(where: { contentfulId: $contentfulId }, limit: 1) {
    items {
      sys {
        id
      }
      contentfulId
      title
      customContentCollection {
        items {
          __typename
          sys {
            id
          }
          ... on Article {
            sys {
              id
            }
            contentfulId
            title
            content
            mediaCollection {
              items {
                ...AssetFields
              }
            }
          }
        }
      }
    }
  }
}
